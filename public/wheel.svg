<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="ink-bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <g id="spoke">
      <line x1="100" y1="100" x2="100" y2="25" stroke="#f3f4f6" stroke-width="4" stroke-linecap="round" />
      <circle cx="100" cy="25" r="14" stroke="#f3f4f6" stroke-width="3" fill="none" />
      <circle cx="100" cy="24" r="12" stroke="#f3f4f6" stroke-width="1.5" fill="none" opacity="0.8"/>
      <circle cx="100" cy="25" r="7" fill="#f3f4f6" />
    </g>
  </defs>

  <g filter="url(#ink-bleed)">
    <use href="#spoke" />
    <use href="#spoke" transform="rotate(45 100 100)" />
    <use href="#spoke" transform="rotate(90 100 100)" />
    <use href="#spoke" transform="rotate(135 100 100)" />
    <use href="#spoke" transform="rotate(180 100 100)" />
    <use href="#spoke" transform="rotate(225 100 100)" />
    <use href="#spoke" transform="rotate(270 100 100)" />
    <use href="#spoke" transform="rotate(315 100 100)" />

    <circle cx="100" cy="100" r="45" stroke="#f3f4f6" stroke-width="4" fill="none" />
    <circle cx="99" cy="101" r="44" stroke="#f3f4f6" stroke-width="2" fill="none" opacity="0.8" />
    <circle cx="101" cy="99" r="46" stroke="#f3f4f6" stroke-width="1" fill="none" opacity="0.6" />

    <circle cx="100" cy="100" r="12" fill="#f3f4f6" />
    <circle cx="98" cy="102" r="10" fill="#f3f4f6" />
  </g>
</svg>
